name: Terraform CI/CD + Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  TF_VERSION: "1.6.0"
  AWS_REGION:  "us-east-1"

jobs:

  # ── Job 1: Infraestrutura com Terraform ──────────────────────────────────────
  terraform:
    name: Terraform ${{ github.event_name == 'push' && 'Apply' || 'Plan' }}
    runs-on: ubuntu-latest
    outputs:
      frontend_ip: ${{ steps.tf_outputs.outputs.frontend_ip }}
      backend_ip:  ${{ steps.tf_outputs.outputs.backend_ip }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false  # necessário para capturar outputs

      - name: Configurar AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan -no-color -out=tfplan \
            -var="db_password=${{ secrets.TF_VAR_DB_PASSWORD }}"            \
            -var="rabbitmq_password=${{ secrets.TF_VAR_RABBITMQ_PASSWORD }}" \
            -var="jwt_secret=${{ secrets.TF_VAR_JWT_SECRET }}"               \
            -var="ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}"

      - name: Comentar Plan no PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### Terraform Plan 📋
            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\`
            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

      - name: Terraform Apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve tfplan

      - name: Capturar IPs das EC2
        id: tf_outputs
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "frontend_ip=$(terraform output -raw frontend_public_ip)" >> $GITHUB_OUTPUT
          echo "backend_ip=$(terraform output -raw backend_private_ip)"  >> $GITHUB_OUTPUT

  # ── Job 2: Deploy nas EC2 via SSH ────────────────────────────────────────────
  deploy:
    name: Deploy nas EC2
    needs: terraform
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Configurar chave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ needs.terraform.outputs.frontend_ip }} >> ~/.ssh/known_hosts

      - name: Deploy Frontend
        run: |
          ssh -i ~/.ssh/id_rsa \
              -o StrictHostKeyChecking=no \
              ec2-user@${{ needs.terraform.outputs.frontend_ip }} \
              "cd /opt/app && docker compose pull && docker compose up -d --remove-orphans"

      - name: Deploy Backend (via frontend como bastion)
        run: |
          ssh -i ~/.ssh/id_rsa \
              -o StrictHostKeyChecking=no \
              -o ProxyCommand="ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -W %h:%p ec2-user@${{ needs.terraform.outputs.frontend_ip }}" \
              ec2-user@${{ needs.terraform.outputs.backend_ip }} \
              "cd /opt/app && docker compose pull && docker compose up -d --remove-orphans"

      - name: Verificar saúde da aplicação
        run: |
          echo "Aguardando aplicação subir..."
          sleep 20
          curl -f --retry 5 --retry-delay 10 \
               http://${{ needs.terraform.outputs.frontend_ip }}/health \
          && echo "✅ Aplicação no ar!" \
          || echo "⚠️ Health check falhou — verifique os logs nas EC2"
