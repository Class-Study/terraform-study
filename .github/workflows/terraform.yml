name: Terraform CI/CD + Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: "Ação a executar"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
          - destroy

env:
  TF_VERSION: "1.6.0"
  AWS_REGION:  "us-east-1"
  TF_COMMON_VARS: >-
    -var="db_password=${{ secrets.TF_VAR_DB_PASSWORD }}"
    -var="rabbitmq_password=${{ secrets.TF_VAR_RABBITMQ_PASSWORD }}"
    -var="jwt_secret=${{ secrets.TF_VAR_JWT_SECRET }}"
    -var="ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}"

jobs:

  # ── Job 1: Infraestrutura com Terraform ──────────────────────────────────────
  terraform:
    name: >-
      Terraform
      ${{ github.event.inputs.action == 'destroy' && 'Destroy' ||
          github.event_name == 'push' && 'Apply' || 'Plan' }}
    runs-on: ubuntu-latest
    environment: terraform
    outputs:
      frontend_ip: ${{ steps.tf_outputs.outputs.frontend_ip }}
      backend_ip:  ${{ steps.tf_outputs.outputs.backend_ip }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Configurar AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Validate
        run: terraform validate

      # ── Importar recursos que já existem na AWS (apply parcial anterior) ────
      # continue-on-error: true pois falha se o recurso não existe ainda ou já está no state
      - name: Importar Key Pair existente (se houver)
        if: github.event.inputs.action != 'destroy'
        run: |
          terraform import ${{ env.TF_COMMON_VARS }} \
            aws_key_pair.main \
            "eduspace-dev-key" \
          && echo "✅ Key pair importado para o state" \
          || echo "ℹ️ Key pair não precisou ser importado"
        continue-on-error: true

      # ── DESTROY manual (somente via workflow_dispatch) ──────────────────────
      - name: "⚠️ Terraform Destroy"
        if: github.event.inputs.action == 'destroy'
        run: |
          echo "::warning::Executando DESTROY — toda a infraestrutura será removida!"
          terraform destroy -auto-approve ${{ env.TF_COMMON_VARS }}

      # ── PLAN (PRs, push e manual) ───────────────────────────────────────────
      - name: Terraform Plan
        id: plan
        if: github.event.inputs.action != 'destroy'
        run: |
          terraform plan -no-color -out=tfplan ${{ env.TF_COMMON_VARS }}

      - name: Comentar Plan no PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### Terraform Plan 📋
            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\`
            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

      # ── APPLY (push na main ou manual com action=apply) ─────────────────────
      - name: Terraform Apply
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          github.event.inputs.action == 'apply'
        run: terraform apply -auto-approve tfplan

      - name: Capturar IPs das EC2
        id: tf_outputs
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          github.event.inputs.action == 'apply'
        run: |
          echo "frontend_ip=$(terraform output -raw frontend_public_ip)" >> $GITHUB_OUTPUT
          echo "backend_ip=$(terraform output -raw backend_private_ip)"  >> $GITHUB_OUTPUT

  # ── Job 2: Deploy nas EC2 via SSH ────────────────────────────────────────────
  deploy:
    name: Deploy nas EC2
    needs: terraform
    if: |
      github.event.inputs.action != 'destroy' &&
      ((github.event_name == 'push' && github.ref == 'refs/heads/main') ||
       github.event.inputs.action == 'apply')
    runs-on: ubuntu-latest
    environment: terraform
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar chave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ needs.terraform.outputs.frontend_ip }} >> ~/.ssh/known_hosts

      # ── Aguardar EC2 frontend inicializar (user_data pode demorar ~3-5min) ──
      - name: Aguardar Frontend EC2 pronta
        run: |
          echo "Aguardando /opt/app estar disponível no frontend..."
          for i in $(seq 1 36); do
            if ssh -i ~/.ssh/id_rsa \
                   -o StrictHostKeyChecking=no \
                   -o ConnectTimeout=10 \
                   -o BatchMode=yes \
                   ubuntu@${{ needs.terraform.outputs.frontend_ip }} \
                   "test -f /opt/app/docker-compose.yml" 2>/dev/null; then
              echo "✅ Frontend EC2 pronta! ($((i * 10))s)"
              break
            fi
            echo "⏳ Aguardando... tentativa $i/36 ($((i * 10))s)"
            sleep 10
          done

      # ── Aguardar EC2 backend inicializar (via frontend como bastion) ─────────
      - name: Aguardar Backend EC2 pronta
        run: |
          echo "Aguardando /opt/app estar disponível no backend..."
          for i in $(seq 1 36); do
            if ssh -i ~/.ssh/id_rsa \
                   -o StrictHostKeyChecking=no \
                   -o ConnectTimeout=10 \
                   -o BatchMode=yes \
                   -o ProxyCommand="ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -W %h:%p ubuntu@${{ needs.terraform.outputs.frontend_ip }}" \
                   ubuntu@${{ needs.terraform.outputs.backend_ip }} \
                   "test -f /opt/app/docker-compose.yml" 2>/dev/null; then
              echo "✅ Backend EC2 pronta! ($((i * 10))s)"
              break
            fi
            echo "⏳ Aguardando... tentativa $i/36 ($((i * 10))s)"
            sleep 10
          done

      # ── Deploy Frontend ─────────────────────────────────────────────────────
      - name: Deploy Frontend
        id: deploy_frontend
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USER:  ${{ github.actor }}
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
            ubuntu@${{ needs.terraform.outputs.frontend_ip }} \
            "echo '${{ secrets.GHCR_TOKEN }}' | docker login ghcr.io -u '${{ github.actor }}' --password-stdin \
             && cd /opt/app \
             && docker compose pull \
             && docker compose up -d --remove-orphans \
             && docker logout ghcr.io"

      # ── Deploy Backend ──────────────────────────────────────────────────────
      - name: Deploy Backend (via frontend como bastion)
        id: deploy_backend
        run: |
          ssh -i ~/.ssh/id_rsa \
              -o StrictHostKeyChecking=no \
              -o ProxyCommand="ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -W %h:%p ubuntu@${{ needs.terraform.outputs.frontend_ip }}" \
              ubuntu@${{ needs.terraform.outputs.backend_ip }} \
              "echo '${{ secrets.GHCR_TOKEN }}' | docker login ghcr.io -u '${{ github.actor }}' --password-stdin \
               && cd /opt/app \
               && docker compose pull \
               && docker compose up -d --remove-orphans \
               && docker logout ghcr.io"

      # ── Health check ────────────────────────────────────────────────────────
      - name: Health check
        id: healthcheck
        run: |
          echo "Aguardando aplicação subir..."
          sleep 30
          curl -f --retry 5 --retry-delay 10 \
               http://${{ needs.terraform.outputs.frontend_ip }}/health \
          && echo "✅ Aplicação no ar!" \
          || (echo "❌ Health check falhou" && exit 1)

      # ── Rollback automático se health check falhar ──────────────────────────
      - name: "🔄 Rollback Frontend"
        if: failure() && steps.healthcheck.outcome == 'failure'
        run: |
          echo "::warning::Health check falhou — executando rollback do frontend..."
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
            ubuntu@${{ needs.terraform.outputs.frontend_ip }} \
            "cd /opt/app && docker compose down && docker compose up -d"
          echo "Rollback do frontend concluído"

      - name: "🔄 Rollback Backend"
        if: failure() && steps.healthcheck.outcome == 'failure'
        run: |
          echo "::warning::Executando rollback do backend..."
          ssh -i ~/.ssh/id_rsa \
              -o StrictHostKeyChecking=no \
              -o ProxyCommand="ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -W %h:%p ubuntu@${{ needs.terraform.outputs.frontend_ip }}" \
              ubuntu@${{ needs.terraform.outputs.backend_ip }} \
              "cd /opt/app && docker compose down && docker compose up -d"
          echo "Rollback do backend concluído"
